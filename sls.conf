srt {
    worker_threads 2;
    worker_connections 300;
    http_port 8181;
    log_file /dev/stdout;
    log_level info;

    server {
        listen_player 4000;
        listen_publisher 8890;
        listen_publisher_srtla 4001;

        latency_min 200;
        latency_max 5000;
        domain_player play;
        domain_publisher live;
        default_sid live/live/default;
        backlog 100;
        idle_streams_timeout 30;

        app {
            app_player live;
            app_publisher live;
            allow publish all;
            allow play all;
        }
    }
}
